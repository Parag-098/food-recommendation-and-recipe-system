{% extends 'base.html' %}

{% block title %}Custom Recommendation{% endblock %}

{% block content %}
<section class="panel">
  <h2>Custom Recommendation</h2>
  <p class="section-copy">Set calorie, diet, taste, cost, and prep-time preferences.</p>
  <form method="POST" class="form-grid">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="button">Get Recommendations</button>
  </form>
</section>
{% endblock %}
